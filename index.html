<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ガイア動物病院 レジ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green:        #1a5c3a;
  --green-dark:   #0f3c26;
  --green-light:  #e8f0ea;
  --green-mid:    #f4f7f4;
  --bg:           #f7f7f5;
  --surface:      #ffffff;
  --border:       #d8d8d2;
  --border-soft:  #ebebe6;
  --text:         #1a1a1a;
  --muted:        #6b6b65;
  --hint:         #9c9c95;
  --accent:       #2e7d52;
  --warn:         #c8553d;
  --shadow:       0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg:    0 8px 32px rgba(0,0,0,0.16);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  overflow: hidden;
}

button, input, select, textarea {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}
button { cursor: pointer; border: none; background: none; }

/* ===== レイアウト ===== */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ===== ヘッダー ===== */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.app-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: 0.05em;
  margin-right: 8px;
}
.field-group {
  display: flex;
  align-items: center;
  gap: 4px;
}
.field-label {
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
}
.app-header select,
.app-header input {
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 5px 8px;
  font-size: 13px;
  background: var(--surface);
  outline: none;
  transition: border-color 0.15s;
}
.app-header select:focus,
.app-header input:focus {
  border-color: var(--green);
}
.app-header input[type="text"] { width: 110px; }
.app-header select { width: 110px; }
.app-header input[type="date"] { width: 130px; }

.header-status {
  margin-left: auto;
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--hint);
}
.status-dot.ok    { background: #2ea05a; }
.status-dot.error { background: var(--warn); }

/* ===== メインエリア ===== */
.app-main {
  flex: 1;
  display: flex;
  overflow: hidden;
  gap: 1px;
  background: var(--border);
}

/* ===== 左：注文リスト ===== */
.cart-panel {
  width: 320px;
  flex-shrink: 0;
  background: var(--surface);
  display: flex;
  flex-direction: column;
}
.cart-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-soft);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.cart-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}
.cart-count {
  font-size: 11px;
  color: var(--muted);
  background: var(--green-light);
  padding: 2px 8px;
  border-radius: 10px;
}
.cart-header-right { display: flex; align-items: center; gap: 8px; }
.btn-clear-all {
  font-size: 11px;
  color: var(--warn);
  border: 1px solid #f5d0c7;
  background: #fef0ec;
  padding: 3px 10px;
  border-radius: 10px;
  font-weight: 500;
  transition: all 0.12s;
}
.btn-clear-all:hover { background: var(--warn); color: #fff; border-color: var(--warn); }
.btn-clear-all:disabled { opacity: 0.4; cursor: not-allowed; }

.cart-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}
.cart-empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--hint);
  font-size: 12px;
  line-height: 1.8;
}

.cart-item {
  padding: 8px 34px 8px 14px;
  border-bottom: 1px solid var(--border-soft);
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.cart-item:hover { background: var(--green-mid); }
.cart-item.selected {
  background: var(--green-light);
  border-left: 3px solid var(--green);
  padding-left: 11px;
}
.cart-item.powder { border-left: 3px solid #c89c2e; padding-left: 11px; }
.cart-item.powder.selected { background: #fef5dd; }

.cart-item-del {
  position: absolute;
  top: 50%;
  right: 8px;
  transform: translateY(-50%);
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #fef0ec;
  color: var(--warn);
  font-size: 16px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.12s;
}
.cart-item-del:hover { background: var(--warn); color: #fff; }

.cart-item-name {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 2px;
  line-height: 1.4;
}
.cart-item-detail {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
}
.cart-item-amount {
  font-weight: 700;
  color: var(--text);
  font-size: 13px;
}

/* ===== 編集パネル（行選択中に表示） ===== */
.edit-panel {
  border-top: 1px solid var(--border);
  background: var(--green-mid);
  padding: 10px 12px;
  flex-shrink: 0;
}
.edit-panel.hidden { display: none; }
.edit-panel-title {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 6px;
}
.edit-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.edit-row label {
  font-size: 11px;
  color: var(--muted);
  width: 36px;
}
.edit-row input {
  flex: 1;
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 13px;
  text-align: right;
  background: var(--surface);
  outline: none;
}
.edit-row input:focus { border-color: var(--green); }
.edit-row .unit {
  font-size: 11px;
  color: var(--muted);
}

.qty-shortcut {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-bottom: 6px;
}
.qty-shortcut button {
  padding: 6px 0;
  font-size: 11px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-weight: 500;
  color: var(--text);
  transition: all 0.1s;
}
.qty-shortcut button:hover {
  background: var(--green);
  color: #fff;
  border-color: var(--green);
}
.qty-shortcut button.minus { color: var(--warn); }
.qty-shortcut button.minus:hover {
  background: var(--warn);
  color: #fff;
  border-color: var(--warn);
}
.qty-shortcut button.clear {
  color: var(--muted);
  font-size: 10px;
}

.edit-actions {
  display: flex;
  gap: 6px;
}
.edit-actions button {
  flex: 1;
  padding: 6px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
}
.btn-delete {
  background: #fef0ec;
  color: var(--warn);
  border: 1px solid #f5d0c7;
}
.btn-delete:hover { background: var(--warn); color: #fff; }
.btn-close-edit {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
}

/* ===== 合計エリア ===== */
.totals {
  border-top: 1px solid var(--border);
  background: var(--surface);
  padding: 10px 14px;
  flex-shrink: 0;
}
.totals-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 3px;
}
.totals-row.grand {
  font-size: 18px;
  font-weight: 700;
  color: var(--green-dark);
  margin-top: 6px;
  padding-top: 6px;
  border-top: 2px solid var(--green);
}
.btn-checkout {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  background: var(--green);
  color: #fff;
  border-radius: 6px;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.05em;
  transition: background 0.15s;
}
.btn-checkout:hover:not(:disabled) { background: var(--green-dark); }
.btn-checkout:disabled { background: var(--hint); cursor: not-allowed; }

/* ===== 右：商品エリア ===== */
.product-panel {
  flex: 1;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.product-toolbar {
  padding: 10px 14px;
  display: flex;
  gap: 8px;
  align-items: center;
  border-bottom: 1px solid var(--border-soft);
  flex-shrink: 0;
}
.search-box {
  flex: 1;
  position: relative;
  max-width: 280px;
}
.search-box input {
  width: 100%;
  padding: 7px 32px 7px 32px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: var(--green-mid);
  outline: none;
  font-size: 13px;
}
.search-box input:focus {
  background: var(--surface);
  border-color: var(--green);
}
.search-box::before {
  content: "🔍";
  position: absolute;
  left: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
  opacity: 0.5;
}
/* 検索クリア（×）ボタン：入力があるときだけ表示 */
.search-clear {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--border);
  color: #fff;
  font-size: 14px;
  line-height: 1;
  display: none;
  align-items: center;
  justify-content: center;
  transition: background 0.12s;
}
.search-clear:hover { background: var(--muted); }
.search-box.has-text .search-clear { display: flex; }

.btn-powder {
  padding: 7px 14px;
  background: #fff5dd;
  border: 1px solid #d4b75e;
  color: #8b6f10;
  border-radius: 5px;
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  transition: all 0.15s;
}
.btn-powder:hover {
  background: #c89c2e;
  color: #fff;
  border-color: #c89c2e;
}

/* カテゴリタブ */
.category-tabs {
  padding: 8px 14px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  border-bottom: 1px solid var(--border-soft);
  flex-shrink: 0;
}
.category-tabs::-webkit-scrollbar { height: 4px; }
.category-tabs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.cat-tab {
  padding: 6px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  font-size: 13px;
  white-space: nowrap;
  font-weight: 500;
  color: var(--muted);
  transition: all 0.15s;
}
.cat-tab:hover { border-color: var(--green); color: var(--green); }
.cat-tab.active {
  background: var(--green);
  color: #fff;
  border-color: var(--green);
}

/* 商品グリッド */
.product-grid {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 8px;
  align-content: start;
}

.product-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 8px;
  text-align: center;
  cursor: pointer;
  transition: all 0.1s;
  min-height: 78px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.product-tile:hover {
  border-color: var(--green);
  background: var(--green-mid);
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}
.product-tile:active { transform: translateY(0); }
.product-tile::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  background: var(--tile-color, var(--green));
}
.tile-name {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.3;
  margin-bottom: 4px;
}
.tile-dose {
  font-size: 11px;
  color: var(--muted);
}
.tile-price {
  font-size: 12px;
  color: var(--green-dark);
  font-weight: 700;
  margin-top: 2px;
}
.tile-multidose {
  position: absolute;
  top: 4px;
  right: 6px;
  font-size: 10px;
  color: var(--muted);
}

.empty-products {
  grid-column: 1 / -1;
  padding: 40px;
  text-align: center;
  color: var(--hint);
  font-size: 13px;
}

/* ===== モーダル共通 ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(20, 30, 25, 0.5);
  backdrop-filter: blur(2px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 16px;
}
.modal-overlay.hidden { display: none; }

.modal {
  background: var(--surface);
  border-radius: 10px;
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 520px;
  max-height: 92vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  animation: modalIn 0.18s ease-out;
}
@keyframes modalIn {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.modal-header {
  padding: 12px 18px;
  background: var(--green);
  color: #fff;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-title {
  font-size: 15px;
  font-weight: 700;
}
.modal-close {
  color: #fff;
  font-size: 22px;
  line-height: 1;
  padding: 0 4px;
  opacity: 0.8;
}
.modal-close:hover { opacity: 1; }
.modal-body {
  padding: 18px;
  overflow-y: auto;
}
.modal-footer {
  padding: 12px 18px;
  border-top: 1px solid var(--border-soft);
  display: flex;
  gap: 8px;
  background: var(--green-mid);
}
.modal-footer button {
  flex: 1;
  padding: 10px;
  border-radius: 5px;
  font-size: 14px;
  font-weight: 500;
}
.btn-cancel {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
}
.btn-confirm {
  background: var(--green);
  color: #fff;
}
.btn-confirm:hover { background: var(--green-dark); }
.btn-confirm:disabled { background: var(--hint); cursor: not-allowed; }

/* ===== 用量モーダル ===== */
.dose-info {
  text-align: center;
  margin-bottom: 14px;
}
.dose-product-name {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 4px;
}
.dose-instruction {
  font-size: 12px;
  color: var(--muted);
}
.dose-options {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
  margin-bottom: 14px;
}
.dose-opt {
  padding: 12px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  text-align: center;
  cursor: pointer;
  transition: all 0.1s;
}
.dose-opt:hover { border-color: var(--green); background: var(--green-mid); }
.dose-opt.selected {
  border-color: var(--green);
  background: var(--green-light);
}
.dose-value {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 2px;
}
.dose-price {
  font-size: 12px;
  color: var(--green-dark);
}

.dose-qty-section {
  background: var(--green-mid);
  padding: 12px;
  border-radius: 6px;
}
.dose-qty-section .field-label {
  display: block;
  margin-bottom: 6px;
}
.dose-qty-input {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 16px;
  text-align: center;
  background: var(--surface);
  outline: none;
}
.dose-qty-input:focus { border-color: var(--green); }
.dose-total {
  margin-top: 10px;
  text-align: right;
  font-size: 14px;
  color: var(--muted);
}
.dose-total strong {
  color: var(--green-dark);
  font-size: 18px;
  margin-left: 6px;
}

/* ===== 粉薬モーダル ===== */
.powder-info {
  background: #fef5dd;
  border: 1px solid #f0d987;
  border-radius: 5px;
  padding: 10px 12px;
  font-size: 12px;
  color: #6f5510;
  margin-bottom: 14px;
  line-height: 1.6;
}
.powder-field {
  margin-bottom: 14px;
}
.powder-field label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
  font-weight: 500;
}
.powder-field input {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 5px;
  font-size: 16px;
  text-align: right;
  background: var(--surface);
  outline: none;
}
.powder-field input:focus { border-color: var(--green); }
.powder-total-display {
  text-align: right;
  font-size: 14px;
  color: var(--muted);
  padding: 12px;
  background: var(--green-light);
  border-radius: 6px;
}
.powder-total-display strong {
  color: var(--green-dark);
  font-size: 22px;
  font-weight: 700;
  margin-left: 8px;
}

/* ===== 仕切書プレビュー ===== */
.receipt-modal {
  max-width: 600px;
}
.receipt-paper {
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
  background: var(--surface);
  border: 1px solid var(--border-soft);
  padding: 18px 16px;
  font-family: 'Noto Sans JP', sans-serif;
}
.receipt-hospital {
  text-align: center;
  margin-bottom: 8px;
}
.receipt-hospital-name {
  font-family: 'Noto Serif JP', serif;
  font-weight: 700;
  font-size: 15px;
  color: var(--green-dark);
  letter-spacing: 0.05em;
}
.receipt-hospital-info {
  font-size: 10px;
  color: var(--muted);
  line-height: 1.5;
}
.receipt-divider {
  border-top: 1px dashed var(--border);
  margin: 8px 0;
}
.receipt-divider-solid {
  border-top: 1px solid var(--text);
  margin: 8px 0;
}
.receipt-title {
  text-align: center;
  font-family: 'Noto Serif JP', serif;
  font-weight: 700;
  font-size: 17px;
  letter-spacing: 0.3em;
  margin: 6px 0;
}
.receipt-meta {
  font-size: 11px;
  line-height: 1.7;
  margin-bottom: 6px;
}
.receipt-meta-row {
  display: flex;
  justify-content: space-between;
}
.receipt-customer {
  font-size: 13px;
  font-weight: 700;
  margin: 4px 0;
}
.receipt-items {
  margin: 8px 0;
}
.receipt-item-line {
  font-size: 12px;
  margin-bottom: 4px;
}
.receipt-item-name {
  display: flex;
  justify-content: space-between;
  font-weight: 500;
}
.receipt-item-detail {
  font-size: 10px;
  color: var(--muted);
  padding-left: 12px;
}
.receipt-totals {
  margin-top: 8px;
}
.receipt-totals-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 2px;
}
.receipt-totals-row.grand {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-top: 4px;
  padding-top: 4px;
  border-top: 1.5px solid var(--text);
}
.receipt-footer {
  margin-top: 12px;
  text-align: center;
  font-size: 10px;
  color: var(--muted);
  line-height: 1.6;
}
.receipt-hospital-bottom {
  margin-top: 14px;
  text-align: center;
}
.receipt-hospital-bottom .receipt-divider-solid {
  margin-bottom: 8px;
}
.print-hospital-block {
  margin-top: 18px;
  text-align: center;
}
.print-hospital-block .print-divider-solid {
  margin-bottom: 6px;
}

/* ===== 印刷専用：A5×2枚 ===== */
.print-area { display: none; }
@media print {
  body * { visibility: hidden; }
  .print-area, .print-area * { visibility: visible; }
  .print-area { display: block; position: absolute; left: 0; top: 0; }
  @page { size: A5 portrait; margin: 0; }
}

.print-page {
  width: 148mm;
  height: 210mm;
  padding: 12mm 10mm;
  background: #fff;
  page-break-after: always;
  position: relative;
  font-size: 11px;
  color: #000;
  font-family: 'Noto Sans JP', sans-serif;
}
.print-page:last-child { page-break-after: auto; }

.print-watermark {
  position: absolute;
  top: 12mm;
  right: 10mm;
  font-family: 'Noto Serif JP', serif;
  font-size: 16px;
  font-weight: 700;
  border: 2px solid var(--green-dark);
  color: var(--green-dark);
  padding: 3px 10px;
  letter-spacing: 0.3em;
}

.print-hospital-name {
  text-align: center;
  font-family: 'Noto Serif JP', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--green-dark);
}
.print-hospital-info {
  text-align: center;
  font-size: 10px;
  color: #555;
  margin-bottom: 6px;
  line-height: 1.5;
}
.print-divider {
  border-top: 1px dashed #888;
  margin: 6px 0;
}
.print-divider-solid {
  border-top: 1.5px solid #000;
  margin: 6px 0;
}
.print-title {
  text-align: center;
  font-family: 'Noto Serif JP', serif;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: 0.4em;
  margin: 8px 0;
}
.print-meta {
  font-size: 11px;
  line-height: 1.7;
  margin-bottom: 4px;
  display: flex;
  justify-content: space-between;
}
.print-customer {
  font-size: 14px;
  font-weight: 700;
  margin: 4px 0 8px;
}
.print-item-line {
  font-size: 12px;
  margin-bottom: 5px;
}
.print-item-name {
  display: flex;
  justify-content: space-between;
}
.print-item-detail {
  font-size: 10px;
  color: #555;
  padding-left: 10px;
}
.print-totals-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  margin-bottom: 2px;
}
.print-totals-row.grand {
  font-size: 16px;
  font-weight: 700;
  margin-top: 6px;
  padding-top: 4px;
  border-top: 1.5px solid #000;
}
.print-thanks {
  margin-top: 16px;
  text-align: center;
  font-size: 10px;
  line-height: 1.7;
  color: #333;
}

/* ローディング */
.loading {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  flex-direction: column;
  gap: 14px;
}
.loading.hidden { display: none; }
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--green-light);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-size: 13px;
  color: var(--muted);
}

/* トースト */
.toast {
  position: fixed;
  top: 70px;
  right: 16px;
  background: var(--green-dark);
  color: #fff;
  padding: 10px 18px;
  border-radius: 6px;
  font-size: 13px;
  box-shadow: var(--shadow-lg);
  z-index: 200;
  animation: toastIn 0.2s ease-out;
}
.toast.error { background: var(--warn); }
@keyframes toastIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
</style>
</head>
<body>

<div class="app">
  <!-- ヘッダー -->
  <header class="app-header">
    <div class="app-title">🐾 ガイア動物病院 レジ</div>
    <div class="field-group">
      <span class="field-label">担当</span>
      <select id="staffSelect"></select>
    </div>
    <div class="field-group">
      <span class="field-label">飼い主</span>
      <input type="text" id="ownerName" placeholder="氏名">
    </div>
    <div class="field-group">
      <span class="field-label">ペット</span>
      <input type="text" id="petName" placeholder="名前">
    </div>
    <div class="field-group">
      <span class="field-label">日付</span>
      <input type="date" id="visitDate">
    </div>
    <div class="header-status">
      <span class="status-dot" id="connStatus"></span>
      <span id="connText">未接続</span>
    </div>
  </header>

  <!-- メイン -->
  <main class="app-main">

    <!-- 左：注文リスト -->
    <section class="cart-panel">
      <div class="cart-header">
        <span class="cart-title">診療内容</span>
        <div class="cart-header-right">
          <span class="cart-count" id="cartCount">0 件</span>
          <button class="btn-clear-all" id="clearAllBtn" onclick="clearAll()" title="すべて消去">全消去</button>
        </div>
      </div>
      <div class="cart-list" id="cartList">
        <div class="cart-empty">
          商品タイルをタップして<br>診療内容を追加してください
        </div>
      </div>

      <!-- 編集パネル -->
      <div class="edit-panel hidden" id="editPanel">
        <div class="edit-panel-title" id="editPanelTitle">編集中</div>
        <div class="edit-row">
          <label>数量</label>
          <input type="number" id="editQty" step="0.25" min="0">
          <span class="unit" id="editQtyUnit">錠</span>
        </div>
        <div class="qty-shortcut" id="qtyShortcut">
          <button type="button" class="minus" data-add="-1">−1</button>
          <button type="button" class="minus" data-add="-0.5">−0.5</button>
          <button type="button" class="minus" data-add="-0.25">−0.25</button>
          <button type="button" data-add="0.25">+0.25</button>
          <button type="button" data-add="0.5">+0.5</button>
          <button type="button" data-add="1">+1</button>
          <button type="button" class="clear" data-add="clear">クリア</button>
        </div>
        <div class="edit-row">
          <label>単価</label>
          <input type="number" id="editPrice" step="1" min="0">
          <span class="unit">円</span>
        </div>
        <div class="edit-actions">
          <button type="button" class="btn-delete" onclick="deleteSelected()">削除</button>
          <button type="button" class="btn-close-edit" onclick="closeEdit()">閉じる</button>
        </div>
      </div>

      <!-- 合計 -->
      <div class="totals">
        <div class="totals-row"><span>小計</span><span id="subtotalDisp">¥0</span></div>
        <div class="totals-row"><span>消費税(10%)</span><span id="taxDisp">¥0</span></div>
        <div class="totals-row grand"><span>合計</span><span id="totalDisp">¥0</span></div>
        <button class="btn-checkout" id="checkoutBtn" onclick="openReceipt()" disabled>支払いへ進む</button>
      </div>
    </section>

    <!-- 右：商品エリア -->
    <section class="product-panel">
      <div class="product-toolbar">
        <div class="search-box" id="searchBox">
          <input type="text" id="searchInput" placeholder="品名・カナ・略称で検索">
          <button class="search-clear" id="searchClear" onclick="clearSearch()" title="検索をクリア">×</button>
        </div>
        <button class="btn-powder" onclick="openPowderModal()">＋ 粉薬を追加</button>
      </div>
      <div class="category-tabs" id="categoryTabs"></div>
      <div class="product-grid" id="productGrid"></div>
    </section>
  </main>
</div>

<!-- ============ 用量モーダル ============ -->
<div class="modal-overlay hidden" id="doseModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">用量を選択</span>
      <button class="modal-close" onclick="closeDoseModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="dose-info">
        <div class="dose-product-name" id="doseProductName"></div>
        <div class="dose-instruction">用量を選んでから、数量を入力してください</div>
      </div>
      <div class="dose-options" id="doseOptions"></div>
      <div class="dose-qty-section">
        <span class="field-label" id="doseQtyLabel">数量（小数OK：例 6.5）</span>
        <input type="number" id="doseQty" class="dose-qty-input" step="0.25" min="0" value="1" oninput="updateDoseTotal()">
        <div class="dose-total">
          合計：<strong id="doseTotalAmount">¥0</strong>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeDoseModal()">キャンセル</button>
      <button class="btn-confirm" id="doseConfirmBtn" onclick="confirmDose()">注文に追加</button>
    </div>
  </div>
</div>

<!-- ============ 粉薬モーダル ============ -->
<div class="modal-overlay hidden" id="powderModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">処方薬（粉薬）の追加</span>
      <button class="modal-close" onclick="closePowderModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="powder-info">
        💊 明細書には「処方薬（粉薬）　○包　¥○○○」のみ表示されます。<br>
        分包数と1包あたりの単価を入力すると、合計金額が自動計算されます。
      </div>
      <div class="powder-field">
        <label>分包数</label>
        <input type="number" id="powderPacks" min="1" placeholder="例：20" oninput="updatePowderTotal()">
      </div>
      <div class="powder-field">
        <label>1包あたり単価（円・税抜）</label>
        <input type="number" id="powderUnitPrice" min="0" placeholder="例：175" oninput="updatePowderTotal()">
      </div>
      <div class="powder-total-display">
        合計金額：<strong id="powderTotalDisp">¥0</strong>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closePowderModal()">キャンセル</button>
      <button class="btn-confirm" onclick="confirmPowder()">注文に追加</button>
    </div>
  </div>
</div>

<!-- ============ 仕切書プレビューモーダル ============ -->
<div class="modal-overlay hidden" id="receiptModal">
  <div class="modal receipt-modal">
    <div class="modal-header">
      <span class="modal-title">仕切書プレビュー</span>
      <button class="modal-close" onclick="closeReceipt()">×</button>
    </div>
    <div class="modal-body">
      <div class="receipt-paper" id="receiptPreview"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeReceipt()">編集に戻る</button>
      <button class="btn-confirm" id="printBtn" onclick="doPrint()">🖨 印刷＋記録（A5×2枚）</button>
    </div>
  </div>
</div>

<!-- 印刷エリア（画面非表示・印刷時のみ表示） -->
<div class="print-area" id="printArea"></div>

<!-- ローディング -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">読み込み中…</div>
</div>

<script src="config.js"></script>
<script src="gaia_register.js"></script>
</body>
</html>
